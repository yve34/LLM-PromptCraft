<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PromptCraft{% endblock %}</title>

    <!-- Bootstrap 5 (assignment requires Bootstrap) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery (assignment requires jQuery) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- App styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    {% block head_extra %}{% endblock %}
</head>
<body>

    <nav class="navbar pc-navbar">
        <div class="container-fluid px-4">
            <a class="navbar-brand pc-brand" href="{{ url_for('home') }}">PromptCraft</a>
            <span class="pc-navbar-right">{% block nav_right %}{% endblock %}</span>
        </div>
    </nav>

    <main class="pc-main">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap bundle (for any interactive components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
